# Single source of truth for the conda env (Python + pip packages + pins).
#
# New env:       conda env create -f environment.yml
# Update env:    conda env update -f environment.yml --prune
# Activate:      conda activate bursts

name: bursts
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.13
  - pip
  - pip:
      - numpy==2.4.2
      - scipy==1.17.1
      - h5py==3.16.0
      - matplotlib==3.10.8
      - pandas==3.0.1
      - scikit-learn==1.8.0
      - plotly==6.6.0
      - plotly-resampler==0.11.0
      - pytz==2026.1.post1
